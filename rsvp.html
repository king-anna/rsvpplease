<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>You're invited — RSVPplease</title>
  <meta name="description" content="You've been invited! Tap to RSVP in seconds — let your host know if you can make it." />
  <link rel="icon" href="assets/img/logo.svg" />
  <link rel="apple-touch-icon" href="assets/img/apple-touch-icon.png" />
  <meta name="theme-color" content="#ec6a92" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="RSVPplease" />
  <meta property="og:title" content="You're invited 💌" />
  <meta property="og:description" content="Tap to RSVP in seconds — let your host know if you can make it." />
  <meta property="og:image" content="https://rsvpplease.app/assets/img/og.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://rsvpplease.app/assets/img/og.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css?v=15" />
  <style>
    .rsvp-stage { min-height: 100vh; display: grid; place-items: center; padding: 28px 18px; }
    .invite { width: min(460px, 100%); }
    .invite .hero { text-align: center; padding: 10px 6px 4px; }
    .invite .host-note { background: var(--surface-soft); border: 1px solid var(--line); border-radius: var(--r); padding: 14px 16px; font-size: .92rem; color: var(--ink-soft); }
    .detail-line { display: flex; gap: 10px; align-items: center; padding: 9px 0; border-bottom: 1px dashed var(--line); }
    .detail-line:last-child { border-bottom: none; }
    .detail-line .ic { color: var(--rose); }
    .big-choice { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .choice { border: 1.5px solid var(--line-strong); background: var(--surface); border-radius: var(--r); padding: 16px; cursor: pointer; text-align: center; font-weight: 650; transition: .15s; }
    .choice:hover { border-color: var(--pink-500); transform: translateY(-2px); }
    .choice.yes.sel { background: var(--ok-bg); border-color: var(--ok); color: var(--ok); }
    .choice.no.sel { background: var(--no-bg); border-color: var(--no); color: var(--no); }
    .choice .big { font-family: var(--font-display); font-size: 1.5rem; display: block; }
  </style>
</head>
<body>
  <div class="rsvp-stage"><div id="rsvp"></div></div>

  <script src="assets/js/config.js?v=15"></script>
  <script src="assets/js/store.js?v=15"></script>
  <script src="assets/js/api.js?v=15"></script>
  <!-- Supabase client (only used when BACKEND === "supabase") -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/api.supabase.js?v=15"></script>
  <script src="assets/js/ui.js?v=15"></script>
  <script src="assets/js/rsvp.js?v=15"></script>
</body>
</html>
