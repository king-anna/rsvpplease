name: E2E tests

# Playwright drives the full host journey in a real browser (app in
# ?backend=local mode — hermetic, no live backend needed). Runs on every
# frontend change; live smoke tests stay opt-in (E2E_LIVE=1, manual).
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "*.html"
      - "assets/**"
      - "e2e/**"
      - "package.json"
      - "playwright.config.js"
      - ".github/workflows/e2e.yml"

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
