name: Deploy Supabase (migrations + edge functions)

# Runs the schema migration and deploys all Edge Functions to the project.
# Triggered automatically when anything under supabase/ changes on main, or
# manually from the Actions tab / `gh workflow run supabase-deploy.yml`.
#
# Requires two repository secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN  — personal access token: supabase.com/dashboard/account/tokens
#   SUPABASE_DB_PASSWORD   — project DB password: Project Settings → Database
# (The Twilio/Resend/Stripe RUNTIME secrets are set on the project itself, in
#  Supabase → Edge Functions → Secrets, not here.)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "supabase/**"
      - ".github/workflows/supabase-deploy.yml"

env:
  SUPABASE_PROJECT_REF: ehhitnddiudoxgzoxpys

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Push database migrations
        run: supabase db push

      - name: Deploy Edge Functions
        run: supabase functions deploy --project-ref "$SUPABASE_PROJECT_REF"
