name: Set Supabase function secrets

# Manually run (Actions → this workflow → Run workflow), or:
#   gh workflow run set-supabase-secrets.yml
#
# Pushes Edge Function runtime secrets to the project. SENSITIVE values come
# from GitHub repo secrets (Settings → Secrets and variables → Actions) — this
# workflow only references them by name and never prints them. Non-sensitive
# values (site URL, from-address) are set directly here.
#
# Add these repo secrets first (the ones you have):
#   RESEND_API_KEY  STRIPE_SECRET_KEY  STRIPE_WEBHOOK_SECRET  CRON_SECRET
# (SUPABASE_ACCESS_TOKEN is already set from the deploy workflow.)

on:
  workflow_dispatch:

env:
  SUPABASE_PROJECT_REF: ehhitnddiudoxgzoxpys

jobs:
  secrets:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push secrets
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          REF="$SUPABASE_PROJECT_REF"

          # Non-sensitive — set directly.
          supabase secrets set --project-ref "$REF" \
            PUBLIC_SITE_URL="https://rsvpplease.app" \
            "RESEND_FROM=RSVPplease <invites@rsvpplease.app>"

          # Sensitive — only set when the GitHub secret is present (values are
          # never echoed; only the name is printed).
          set_if () {
            if [ -n "$2" ]; then
              supabase secrets set --project-ref "$REF" "$1=$2" >/dev/null && echo "✓ set $1"
            else
              echo "– skipped $1 (no GitHub secret)"
            fi
          }
          set_if RESEND_API_KEY        "$RESEND_API_KEY"
          set_if STRIPE_SECRET_KEY     "$STRIPE_SECRET_KEY"
          set_if STRIPE_WEBHOOK_SECRET "$STRIPE_WEBHOOK_SECRET"
          set_if CRON_SECRET           "$CRON_SECRET"

          echo "Done. Current secret names on the project:"
          supabase secrets list --project-ref "$REF" || true
